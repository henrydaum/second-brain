name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The store lives on the `store` branch: the package manager reads
          # origin/store, and the store-ref tests (test_store_*, MCP) skip
          # without it. Fetch everything so those tests run instead of skip.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Unit tests
        run: pytest tests -q
      - name: Runtime fuzzer (invariant oracle)
        run: pytest stress/fuzz_runtime.py -q
