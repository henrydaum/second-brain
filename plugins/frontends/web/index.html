<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Second Brain Demo</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <section class="chat">
      <header>
        <div>
          <p class="eyebrow">Generative Art Maker</p>
          <h1>Second Brain</h1>
        </div>
        <button id="newChat" title="Start a new conversation">New</button>
      </header>
      <div id="messages" class="messages">
        <article class="assistant">Ask about the demo files, search local notes, or make the agent use a tool.</article>
      </div>
      <form id="chatForm" class="composer">
        <input id="chatInput" autocomplete="off" placeholder="Ask Second Brain..." />
        <button>Send</button>
      </form>
    </section>
    <section class="showcase">
      <canvas id="fractal" width="900" height="700"></canvas>
      <img id="heroImage" alt="">
      <div class="canvas-actions">
        <a id="downloadImage" href="#" download title="Download current image">Download</a>
        <button id="regenerateImage" type="button" title="Re-render the current chain with new seeds">Regenerate</button>
        <button id="shareImage" type="button">Share</button>
      </div>
      <div id="sharePanel" class="share-panel" hidden>
        <input id="shareTitle" placeholder="Title">
        <input id="shareArtist" placeholder="Your name">
        <button id="shareConfirm" type="button">Share</button>
      </div>
      <div id="paletteStrip" class="palette-strip"></div>
    </section>
  </main>
  <section class="gallery-section">
    <div class="gallery-head">
      <p class="eyebrow">Shared Archive</p>
      <h2>Remix the nearest signals.</h2>
    </div>
    <div id="gallery" class="gallery"></div>
  </section>
  <script src="/app.js"></script>
</body>
</html>
